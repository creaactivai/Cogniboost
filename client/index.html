          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A diferencia de los cursos donde te dicen qué temas aprender (que tienen tasas de abandono del 95%), CogniBoost usa Class Labs donde hablas de temas que te interesan y ayudan a tu carrera. Avanzas con profesionales y estudiantes con objetivos similares, guiados por instructores nativos nivel C2. Por eso tenemos tasas de finalización del 87%."
          }
        },
        {
          "@type": "Question",
          "name": "Ya he probado otros cursos de inglés y no me funcionaron. ¿Por qué sería diferente?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Los cursos tradicionales tienen tasas de abandono del 95% porque te obligan a memorizar gramática y repetir diálogos que no te interesan. CogniBoost es diferente: en nuestros Class Labs hablas de temas que te interesan — negocios, entretenimiento, cultura — con profesionales con objetivos similares. Por eso nuestra tasa de finalización es del 87%. Además, tu primera clase es gratis y sin compromiso."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo funcionan los Class Labs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cada Class Lab tiene 8-12 profesionales con objetivos similares. Avanzan juntos durante 8 semanas promedio, con sesiones en vivo sobre temas de tu interés y expertos dándote feedback en tiempo real."
          }
        },
        {
          "@type": "Question",
          "name": "¿Los cursos son en vivo o pregrabados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Combinamos ambos formatos. Tienes acceso a contenido pregrabado para estudiar a tu ritmo, más sesiones en vivo semanales en Class Labs sobre temas de tu interés. Este modelo híbrido maximiza flexibilidad y resultados."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo cancelar mi suscripción?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Por supuesto. Puedes cancelar en cualquier momento y no se te cobrará el próximo mes. Los cambios a planes menores toman efecto al final de tu período de facturación."
          }
        },
        {
          "@type": "Question",
          "name": "¿Ofrecen certificados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Al completar cada curso recibes un certificado digital verificable que puedes compartir en LinkedIn. También tendrás proyectos reales que demuestran tus nuevas habilidades a empleadores potenciales."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuáles temas están disponibles en las sesiones en vivo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nuestros Class Labs cubren más de 20 áreas que incluyen Negocios, Entretenimiento, Cultura, Deporte, Relaciones Interpersonales y más. Dentro de cada categoría hay labs específicos como Real Estate, Películas, etc."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo sé qué curso es el correcto para mí?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cuando te registras, realizas una evaluación que identifica tus fortalezas, áreas de mejora y objetivos. Te recomendamos un camino de aprendizaje personalizado basado en tu perfil y metas específicas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué métodos de pago aceptan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Aceptamos todas las tarjetas de crédito y débito a nivel mundial. También aceptamos métodos de pago como PayPal, Google Pay, Apple Pay, y Pay Over Time en Estados Unidos."
          }
        }
      ]
    }
